version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "dev"
    allow:
      - dependency-type: "direct"
    ignore:
      - dependency-name: "org.apache.felix:maven-bundle-plugin"
        update-types: ["version-update:semver-major"]
      # JUnit 6 requires Java 17+, but the project still targets Java 11.
      - dependency-name: "version.junit"
        update-types: ["version-update:semver-major"]
